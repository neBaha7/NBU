    async function searchDocuments(query, lang) {
      await new Promise(r => setTimeout(r, 400 + Math.random() * 300));
      const q = query.toLowerCase();
      
      // Score each knowledge item by keyword match
      let bestMatch = null;
      let bestScore = 0;
      for (const item of KNOWLEDGE_BASE) {
        let score = 0;
        for (const kw of item.keywords) {
          if (q.includes(kw.toLowerCase())) score += 2;
        }
        // Also check question text similarity
        const qWords = item.q.toLowerCase().split(/\s+/);
        for (const w of q.split(/\s+/)) {
          if (w.length > 3 && qWords.some(qw => qw.includes(w) || w.includes(qw))) score += 1;
        }
        if (score > bestScore) { bestScore = score; bestMatch = item; }
      }
      
      if (bestMatch && bestScore >= 3) {
        let origLabel = lang === 'uz' ? 'Asl nusxa' : lang === 'en' ? 'Original' : 'Оригинал';
        let translatedLabel = lang === 'uz' ? "O'zbekcha" : lang === 'en' ? 'English' : 'Русский';
        
        let formattedAnswer = `**${origLabel}:** ${bestMatch.orig}`;
        if (bestMatch.orig !== bestMatch[lang]) {
          formattedAnswer += `\n\n**${translatedLabel}:** ${bestMatch[lang]}`;
        }
        
        return { 
          query, 
          answer: `${formattedAnswer}\n\n📄 ${lang === 'uz' ? 'Manba' : lang === 'en' ? 'Source' : 'Источник'}: \`${bestMatch.source}\`\n\n_${lang === 'uz' ? 'Savol' : lang === 'en' ? 'Question' : 'Вопрос'} #${bestMatch.id}: ${bestMatch.q}_`,
          sources: [
            { id: bestMatch.id, filename: bestMatch.source, sheet: 'Financial Data', relevance: Math.min(0.99, 0.85 + bestScore * 0.02) }
          ], 
          timestamp: new Date().toISOString(), 
          processingTimeMs: Math.floor(180 + Math.random() * 120)
        };
      }
      
      // No match — suggest available topics
      const suggestions = {
        uz: "Kechirasiz, bu so'rov uchun aniq javob topilmadi. Quyidagi mavzularda so'rov yuborishingiz mumkin:\n\n• Kompaniya manzili (Angren, Agrobank, Anor Bank)\n• Moliyaviy ko'rsatkichlar (ustav kapitali, sof foyda, daromad)\n• Bank ma'lumotlari (MFO, xizmat ko'rsatuvchi bank)\n• Kontakt ma'lumotlari (email, veb-sayt)",
        ru: "К сожалению, точный ответ на этот запрос не найден. Вы можете задать вопросы по следующим темам:\n\n• Адрес компании (Angren, Agrobank, Anor Bank)\n• Финансовые показатели (уставный капитал, чистая прибыль, выручка)\n• Банковские данные (МФО, обслуживающий банк)\n• Контактные данные (email, веб-сайт)",
        en: "Sorry, no exact match found for this query. You can ask about:\n\n• Company addresses (Angren, Agrobank, Anor Bank)\n• Financial indicators (authorized capital, net profit, revenue)\n• Bank details (MFO, serving bank)\n• Contact info (email, website)"
      };
      
      return { 
        query, 
        answer: suggestions[lang] || suggestions.en,
        sources: [], 
        timestamp: new Date().toISOString(), 
        processingTimeMs: Math.floor(80 + Math.random() * 60)
      };
    }

      const { lang, setLang } = useLang();
      const dateLocales = { uz: 'uz-UZ', ru: 'ru-RU', en: 'en-US' };
      const today = new Date().toLocaleDateString(dateLocales[lang] || 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      
      return (
        <header className="w-full border-b-4 border-ink bg-news-paper z-40 relative">
          {/* Top Ticker / Metadata Bar */}
          <div className="border-b border-ink flex items-center justify-between px-4 py-1.5 text-xs font-mono uppercase tracking-widest text-news-ink bg-white">
            <div className="flex gap-6">
              <span>Vol. CXCIV — No. 64</span>
              <span className="hidden sm:inline">{t(lang, 'edition')}</span>
            </div>
            <span className="hidden md:inline">{today}</span>
            <div className="flex items-center gap-4">
              <div className="hidden sm:flex items-center gap-2 text-news-red font-bold">
                <span className="w-2 h-2 bg-news-red inline-block animate-pulse"></span>
                {t(lang, 'pipelineOnline')}
              </div>
              <LangSwitcher lang={lang} setLang={setLang} />
            </div>
          </div>
          
          {/* Main Masthead */}
          <div className="py-8 px-4 text-center border-b border-ink newsprint-texture">
            <h1 className="font-serif font-black text-6xl sm:text-7xl lg:text-9xl tracking-tighter leading-[0.85] text-news-ink mx-auto py-2">
              {t(lang, 'masthead')}
            </h1>
            <p className="font-serif italic text-lg sm:text-2xl text-news-ink mt-4 max-w-2xl mx-auto">
              {t(lang, 'tagline')}
            </p>
          </div>
          
          {/* Main Navigation Row */}
          <nav className="flex divide-x divide-ink border-b-2 border-ink text-sm font-sans uppercase tracking-widest font-semibold bg-white overflow-x-auto">
            <a href="#" className="py-3 px-6 hover:bg-news-ink hover:text-news-paper transition-colors whitespace-nowrap">{t(lang, 'navDashboard')}</a>
            <a href="#" className="py-3 px-6 hover:bg-news-ink hover:text-news-paper transition-colors whitespace-nowrap text-news-red">{t(lang, 'navQuery')}</a>
            <a href="#" className="py-3 px-6 hover:bg-news-ink hover:text-news-paper transition-colors whitespace-nowrap">{t(lang, 'navReports')}</a>
            <a href="#" className="py-3 px-6 hover:bg-news-ink hover:text-news-paper transition-colors whitespace-nowrap">{t(lang, 'navIFRS')}</a>
            <div className="flex-grow"></div>
          </nav>
        </header>
      );
    }

    function QueryInput({ onSearch, isLoading }) {
      const { lang } = useLang();
      const [query, setQuery] = useState('');
      
      const handleSubmit = (e) => { 
        e.preventDefault(); 
        if (query.trim() && !isLoading) onSearch(query.trim()); 
      };

      return (
        <div className="border border-ink bg-white p-6 sm:p-10 relative">
          <div className="flex items-center gap-4 mb-6">
            <div className="w-10 h-10 bg-news-ink text-white flex items-center justify-center font-serif font-bold text-xl flex-shrink-0">
              Q
            </div>
            <h2 className="font-sans font-bold uppercase tracking-widest text-sm text-news-ink">
              {t(lang, 'queryLabel')}
            </h2>
          </div>

          <form onSubmit={handleSubmit} className="flex flex-col sm:flex-row gap-0 group">
            <div className="flex-grow border-2 border-ink bg-news-paper relative hard-shadow-hover">
              <div className="absolute left-4 top-1/2 -translate-y-1/2 text-news-ink pointer-events-none">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square">
                  <path d="M4 9h16 M4 15h16 M10 3L8 21 M16 3l-2 18" />
                </svg>
              </div>
              <input 
                type="text" 
                value={query} 
                onChange={(e) => setQuery(e.target.value)} 
                placeholder={t(lang, 'queryPlaceholder')} 
                disabled={isLoading} 
                className="w-full pl-12 pr-4 py-4 bg-transparent font-mono text-base text-news-ink placeholder:text-news-divider focus-visible:outline-none focus-visible:bg-white transition-colors"
                autoComplete="off" 
              />
            </div>
            
            <button 
              type="submit" 
              disabled={!query.trim() || isLoading} 
              className="mt-4 sm:mt-0 sm:-ml-[2px] border-2 border-ink bg-news-ink text-news-paper px-8 py-4 font-sans font-bold uppercase tracking-widest text-sm hover:bg-news-red hover:border-news-red transition-colors disabled:opacity-50 disabled:bg-news-ink disabled:border-ink z-10"
            >
              {isLoading ? t(lang, 'btnProcessing') : t(lang, 'btnExecute')}
            </button>
          </form>
          
          <div className="mt-4 flex items-center justify-between border-t border-ink/20 pt-3">
            <span className="font-mono text-[10px] uppercase tracking-wider text-news-ink/60">
              {t(lang, 'queryHint')}
            </span>
            <span className="font-mono text-[10px] uppercase tracking-wider text-news-red font-bold">
              {t(lang, 'secureConn')}
            </span>
          </div>
        </div>
      );
    }

    function CitationBadge({ filename, sheet, relevance }) {
      const { lang } = useLang();
      const relevancePercent = Math.round(relevance * 100);
      
      return (
        <div className="border border-ink bg-white flex flex-col hover:bg-news-paper transition-colors group cursor-crosshair h-full">
          <div className="border-b border-ink flex justify-between items-center px-3 py-1.5 bg-news-ink text-white">
            <span className="font-mono text-[10px] uppercase tracking-widest">{t(lang, 'docRef')}</span>
            <span className="font-mono text-[10px] font-bold">
              {t(lang, 'match')}: {relevancePercent}%
            </span>
          </div>
          <div className="p-4 flex gap-3 flex-grow items-start">
            <div className="w-8 h-8 border border-ink flex items-center justify-center flex-shrink-0 bg-white group-hover:bg-news-red group-hover:text-white transition-colors">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square">
                <path d="M14 2H6v20h12V8z" />
                <polyline points="14 2 14 8 20 8" />
              </svg>
            </div>
            <div className="flex flex-col flex-grow min-w-0">
              <span className="font-sans font-bold text-sm text-news-ink truncate group-hover:underline decoration-2 underline-offset-2">{filename}</span>
              <span className="font-mono text-xs text-news-ink mt-1 block truncate">{t(lang, 'loc')}: {sheet}</span>
            </div>
          </div>
        </div>
      );
    }

    function ArticleCard({ answer, processingTimeMs, sources }) {
      const { lang } = useLang();
      const [displayedText, setDisplayedText] = useState('');
      const [isTyping, setIsTyping] = useState(true);
      const intervalRef = useRef(null);
      
      useEffect(() => {
        setDisplayedText(''); 
        setIsTyping(true);
        let i = 0;
        intervalRef.current = setInterval(() => {
          if (i < answer.length) { 
            setDisplayedText(answer.slice(0, i + 1)); 
            i++; 
          } else { 
            clearInterval(intervalRef.current); 
            setIsTyping(false); 
          }
        }, 5);
        return () => clearInterval(intervalRef.current);
      }, [answer]);

      return (
        <article className="border-2 border-ink bg-white">
          <header className="border-b-2 border-ink p-6 sm:px-10 sm:py-8 bg-news-paper flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <div className="flex gap-2 mb-3">
                <span className="bg-news-ink text-white font-mono text-[10px] uppercase tracking-widest px-2 py-0.5">
                  {t(lang, 'badgeExclusive')}
                </span>
                <span className="border border-ink bg-white text-news-red font-mono font-bold text-[10px] uppercase tracking-widest px-2 py-0.5">
                  {t(lang, 'badgeAutoGen')}
                </span>
              </div>
              <h2 className="font-serif font-black text-3xl sm:text-4xl text-news-ink leading-tight">
                {t(lang, 'articleTitle')}
              </h2>
            </div>
            
            <div className="flex-shrink-0 flex flex-col items-start md:items-end border-t md:border-t-0 border-ink md:border-l pl-0 md:pl-6 pt-4 md:pt-0">
              <span className="font-sans font-bold uppercase tracking-widest text-xs text-news-ink mb-1">
                {t(lang, 'byline')}
              </span>
              <span className="font-mono text-[10px] uppercase text-news-ink">
                {t(lang, 'processingTime')}: {processingTimeMs}ms
              </span>
              {isTyping && (
                <button onClick={() => { clearInterval(intervalRef.current); setDisplayedText(answer); setIsTyping(false); }} className="mt-3 text-[10px] font-bold uppercase tracking-widest text-news-red border-b border-news-red hover:text-news-ink hover:border-news-ink">
                  {t(lang, 'skipInit')}
                </button>
              )}
            </div>
          </header>
          
          <div className="grid grid-cols-1 lg:grid-cols-12">
            <div className="lg:col-span-8 border-b lg:border-b-0 lg:border-r border-ink p-6 sm:p-10">
              <div className="font-body text-lg text-news-ink leading-[1.7] text-justify columns-1 sm:columns-2 gap-8 relative">
                <div className={`relative ${!isTyping ? 'drop-cap' : ''}`}>
                  <span>{displayedText}</span>
                  {isTyping && <span className="typing-cursor" />}
                </div>
              </div>
              
              {!isTyping && (
                <div className="mt-8 text-center font-serif text-2xl text-news-ink tracking-[1em]">
                  &#x2727; &#x2727; &#x2727;
                </div>
              )}
            </div>
            
            <aside className="lg:col-span-4 bg-news-paper p-6 sm:p-8 flex flex-col">
              <div className="flex items-center gap-3 border-b border-ink pb-4 mb-6">
                <span className="w-6 h-6 bg-news-ink text-white flex items-center justify-center font-serif text-sm font-bold">
                  §
                </span>
                <h3 className="font-sans font-black uppercase tracking-widest text-sm text-news-ink">
                  {t(lang, 'verifiedSources')}
                </h3>
              </div>
              
              {(!isTyping && sources && sources.length > 0) ? (
                <div className="flex flex-col gap-4">
                  {sources.map((source) => (
                    <CitationBadge key={source.id} filename={source.filename} sheet={source.sheet} relevance={source.relevance} />
                  ))}
                </div>
              ) : (
                <div className="flex-grow flex items-center justify-center border border-dashed border-ink/40 p-6 bg-white">
                  <span className="font-mono text-xs uppercase tracking-widest text-news-ink/40 text-center">
                    {isTyping ? t(lang, 'awaitingCitations') : t(lang, 'noSources')}
                  </span>
                </div>
              )}
            </aside>
          </div>
        </article>
      );
    }

    // ═══════════════════════════════════════════════
    //  Layout Shell
    // ═══════════════════════════════════════════════
    
    function SearchPage() {
      const { lang } = useLang();
      const [result, setResult] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      const handleSearch = useCallback(async (query) => {
        setIsLoading(true); 
        setResult(null);
        try { 
          const data = await searchDocuments(query, lang); 
          setResult(data); 
        } 
        catch (e) { console.error(e); } 
        finally { setIsLoading(false); }
      }, [lang]);

      return (
        <main className="max-w-[1400px] mx-auto min-h-screen border-l border-r border-ink bg-news-paper relative shadow-2xl shadow-black/5">
          <NewsHeader />
          
          <div className="grid grid-cols-1 lg:grid-cols-12 border-b-2 border-ink">
            <div className="lg:col-span-9 border-b lg:border-b-0 lg:border-r border-ink p-6 sm:p-12">
              <QueryInput onSearch={handleSearch} isLoading={isLoading} />
              
              <div className="mt-12">
                {isLoading ? (
                  <div className="border border-ink p-10 bg-white flex flex-col items-center justify-center min-h-[400px]">
                    <div className="w-12 h-12 border-4 border-news-ink border-t-news-red animate-spin mb-6" style={{borderRadius:'50%'}}></div>
                    <div className="font-mono text-sm uppercase tracking-widest text-news-ink/70">
                      {t(lang, 'loadingText')}
                    </div>
                  </div>
                ) : result ? (
                  <ArticleCard answer={result.answer} processingTimeMs={result.processingTimeMs} sources={result.sources} />
                ) : (
                  <div className="border border-ink p-12 bg-white text-center newsprint-texture">
                    <span className="font-serif text-5xl text-news-ink/10 select-none">
                      {t(lang, 'blankPage')}
                    </span>
                    <p className="font-sans font-bold uppercase tracking-widest text-sm text-news-ink/40 mt-6">
                      {t(lang, 'awaitingOp')}
                    </p>
                  </div>
                )}
              </div>
            </div>
            
            <aside className="lg:col-span-3 bg-white hidden lg:flex flex-col">
              <div className="border-b border-ink p-6 bg-news-ink text-white">
                <h4 className="font-sans font-black uppercase tracking-widest text-xs mb-4 text-news-red">{t(lang, 'statusTicker')}</h4>
                <div className="space-y-4 font-mono text-xs">
                  <div className="flex justify-between border-b border-white/20 pb-2"><span>{t(lang, 'nodesOnline')}:</span> <span className="font-bold">1,402</span></div>
                  <div className="flex justify-between border-b border-white/20 pb-2"><span>{t(lang, 'avgLatency')}:</span> <span className="font-bold text-green-400">12ms</span></div>
                  <div className="flex justify-between pb-2"><span>{t(lang, 'indexSync')}:</span> <span className="font-bold">100%</span></div>
                </div>
              </div>
              
              <div className="p-8 flex-grow flex items-center justify-center newsprint-texture">
                <div className="border-4 double border-ink p-6 text-center transform -rotate-2 bg-news-paper hard-shadow-hover transition-transform duration-300">
                  <div className="font-serif font-black text-2xl uppercase leading-tight">{t(lang, 'wantedTitle')}</div>
                  <div className="font-sans font-bold text-sm tracking-tighter uppercase mt-2">{t(lang, 'wantedSub')}</div>
                  <div className="w-full h-px bg-ink my-4"></div>
                  <div className="font-body text-sm italic">{t(lang, 'wantedBody')}</div>
                </div>
              </div>
            </aside>
          </div>
          
          <footer className="border-t border-ink bg-white p-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-news-ink font-mono text-[10px] uppercase tracking-widest">
            <div>{t(lang, 'footerCopy')}</div>
            <div className="flex gap-4">
              <a href="#" className="hover:text-news-red hover:underline decoration-2 underline-offset-4">{t(lang, 'footerTerms')}</a>
              <a href="#" className="hover:text-news-red hover:underline decoration-2 underline-offset-4">{t(lang, 'footerPrivacy')}</a>
              <a href="#" className="hover:text-news-red hover:underline decoration-2 underline-offset-4">{t(lang, 'footerGuidelines')}</a>
            </div>
          </footer>
        </main>
      );
    }

    function App() {
      const [lang, setLang] = useState('uz');

      return (
        <LangContext.Provider value={{ lang, setLang }}>
          <SearchPage />
        </LangContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
